<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stopwatch-container">
    <h1>Stopwatch</h1>
    <div id="display">00:00:00.00</div>
    <div class="controls">
        <button id="startBtn" class="btn primary">Start</button>
        <button id="pauseBtn" class="btn warning">Pause</button>
        <button id="lapBtn" class="btn secondary">Lap</button>
        <button id="resetBtn" class="btn danger">Reset</button>
    </div>
    
    <div class="laps-container">
        <div class="laps-header">
            <h2>Lap Times</h2>
        </div>
        <ul id="lapsList"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
